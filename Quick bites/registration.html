<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registration</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/registration.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="index.html">Quick-Bites</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#cafeMenu" aria-controls="cafeMenu" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="cafeMenu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="EventDiscovery.html">Event Discovery</a></li>
                    <li class="nav-item"><a class="nav-link active" aria-current="page" href="registration.html">Register</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row g-4">
            <div class="col-lg-7">
                <div class="card shadow-sm h-100">
                    <div class="card-body">
                        <div class="mb-4 text-center">
                            <h1 class="h3">Welcome to the Registration Form</h1>
                            <p class="text-muted mb-0">Register below to organize your next big moment.</p>
                        </div>

                        <form id="registrationForm" class="registration-form">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label for="firstName" class="form-label">First Name</label>
                                    <input type="text" class="form-control" id="firstName" name="firstName" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="lastName" class="form-label">Last Name</label>
                                    <input type="text" class="form-control" id="lastName" name="lastName" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="email" class="form-label">Email Address</label>
                                <input type="email" class="form-control" id="email" name="email" required>
                            </div>

                            <div class="mb-3">
                                <label for="event" class="form-label">Select Event</label>
                                <select class="form-control" id="event" name="event" required>
                                    <option value="">-- Choose an Event --</option>
                                    <option value="Street Taco Throwdown">Street Taco Throwdown - Sat, 12 July 2025</option>
                                    <option value="Caribbean Spice Workshop">Caribbean Spice Workshop - Sun, 20 July 2025</option>
                                    <option value="Rum & Chocolate Pairing">Rum & Chocolate Pairing - Fri, 25 July 2025</option>
                                    <option value="Sunrise Brunch Social">Sunrise Brunch Social - Sat, 2 Aug 2025</option>
                                    <option value="Ceviche Masterclass">Ceviche Masterclass - Sun, 10 Aug 2025</option>
                                    <option value="Craft Beer Festival">Craft Beer Festival - Sat, 16 Aug 2025</option>
                                </select>
                            </div>

                            <button type="submit" class="btn btn-primary w-100">
                                Register
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-lg-5">
                <div class="card shadow-sm h-100">
                    <div class="card-body">
                        <h2 class="h5 mb-4">Saved Registrations</h2>
                        <div class="registrations-list" id="savedRegistrations"></div>
                        <div id="emptyState" class="empty-state text-muted text-center py-4">
                            <p class="mb-0">No events registered yet.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast">
        <div class="toast-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
        </div>
        <div class="toast-content">
            <span class="toast-title">Successful Receipt</span>
            <span class="toast-message">Your event registration was saved.</span>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/registration.js"></script>
</body>
</html>
